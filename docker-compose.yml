services:
  postgres:
    image: postgres:16
    container_name: stock-portfolio-db
    environment:
      POSTGRES_DB: stock_portfolio_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stock_portfolio_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: stock-portfolio-redis
    ports:
      - "6379:6379"
    volumes:
      - stock_portfolio_redis_data:/data

volumes:
  stock_portfolio_postgres_data:
  stock_portfolio_redis_data: